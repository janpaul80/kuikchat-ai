<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KuikChat Mobile Workflow Loop Source</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #041015;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: 540px;
      height: 960px;
      position: relative;
      overflow: hidden;
      color: #eefcff;
      background:
        radial-gradient(circle at 18% 10%, rgba(78, 231, 220, 0.28), transparent 30%),
        radial-gradient(circle at 90% 32%, rgba(122, 167, 255, 0.22), transparent 33%),
        linear-gradient(160deg, #041015, #0a1c26 54%, #071019);
    }

    .phone {
      position: absolute;
      left: 96px;
      top: 132px;
      width: 348px;
      height: 680px;
      border-radius: 45px;
      padding: 15px;
      background: rgba(7, 23, 31, 0.9);
      border: 1px solid rgba(220, 253, 255, 0.22);
      box-shadow: 0 45px 130px rgba(0, 0, 0, 0.52);
      animation: float 8s ease-in-out infinite;
    }

    .screen {
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      font-weight: 800;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4ee7dc, #8ef6b5);
      color: #042024;
      display: inline-grid;
      place-items: center;
      margin-right: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 9px;
      font-size: 11px;
      color: #cafff7;
      border: 1px solid rgba(142,246,181,0.18);
      background: rgba(142,246,181,0.08);
    }

    .msg {
      width: 78%;
      margin-bottom: 12px;
      padding: 13px 14px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.34;
      background: rgba(255,255,255,0.08);
      animation: in 8s ease-in-out infinite both;
    }

    .msg.right {
      margin-left: auto;
      background: rgba(78,231,220,0.24);
    }

    .msg:nth-of-type(3) { animation-delay: -6s; }
    .msg:nth-of-type(4) { animation-delay: -4.8s; }
    .msg:nth-of-type(5) { animation-delay: -3.4s; }

    .card {
      margin-top: 24px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(78,231,220,0.2);
      background: rgba(4,20,27,0.78);
      animation: lift 8s ease-in-out infinite;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 13px;
      background: rgba(255,255,255,0.1);
    }

    .meter span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #4ee7dc, #8ef6b5);
      transform-origin: left;
      animation: progress 8s linear infinite;
    }

    .assist {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 58px;
      border-radius: 24px;
      padding: 15px 16px;
      border: 1px solid rgba(122,167,255,0.25);
      background: rgba(5,18,25,0.88);
      box-shadow: 0 26px 80px rgba(0,0,0,0.35);
      animation: assist 8s ease-in-out infinite;
    }

    .assist strong { display: block; font-size: 13px; margin-bottom: 7px; }
    .assist span { display: block; height: 8px; border-radius: 999px; background: rgba(219,231,255,0.24); margin: 7px 0; }
    .assist span:nth-child(3) { width: 72%; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1.2deg); }
      50% { transform: translateY(-14px) rotate(1deg); }
    }
    @keyframes in {
      0%, 16% { opacity: 0; transform: translateY(18px); }
      30%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lift {
      0%, 28% { opacity: 0; transform: translateY(18px); }
      42%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress {
      0%, 18% { transform: scaleX(0.1); }
      82%, 100% { transform: scaleX(1); }
    }
    @keyframes assist {
      0%, 44% { opacity: 0; transform: translateY(16px); }
      57%, 88% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone">
      <div class="screen">
        <div class="top"><div><span class="mark">K</span>KuikChat</div><span class="pill">Secure</span></div>
        <div class="msg">Alice: Can you send the final assets?</div>
        <div class="msg right">Uploading through FileNinja now.</div>
        <div class="msg">Hermes summarized the client notes.</div>
        <div class="msg right">Great. Share with the pro room.</div>
        <div class="card">
          <strong>FileNinja transfer</strong><br />
          128 MB secure delivery
          <div class="meter"><span></span></div>
        </div>
      </div>
    </section>
    <aside class="assist">
      <strong>Hermes AI drafted a reply</strong>
      <span></span>
      <span></span>
    </aside>
  </main>
</body>
</html>
